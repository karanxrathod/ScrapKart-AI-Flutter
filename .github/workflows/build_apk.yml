name: Build Flutter APKs

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0' # Adjust based on local version
          channel: 'stable'

      - name: Build ScrapKart AI APK
        run: |
          cd scrapkart_ai
          flutter pub get
          flutter build apk --release

      - name: Upload ScrapKart AI APK
        uses: actions/upload-artifact@v3
        with:
          name: scrapkart_ai_release
          path: scrapkart_ai/build/app/outputs/flutter-apk/app-release.apk

      - name: Build ScrapKart Collector APK
        run: |
          cd scrapkart_collector
          flutter pub get
          flutter build apk --release

      - name: Upload ScrapKart Collector APK
        uses: actions/upload-artifact@v3
        with:
          name: scrapkart_collector_release
          path: scrapkart_collector/build/app/outputs/flutter-apk/app-release.apk
